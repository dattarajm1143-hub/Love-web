<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pihu ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

.container{
background: rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
backdrop-filter: blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:90%;
}

h1{
font-size:30px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:white;
color:#ff4d6d;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:#333;
color:white;
}

.baby-btn{
background:white;
color:#ff4d6d;
margin:8px;
}

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation: float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<div class="container" id="step1">

<h1>💖 Pihu, will you be my baccho ki maa? 👶</h1>
<p>You make my world brighter every day ❤️</p>

<button id="yes" onclick="nextStep()">Yes ❤️</button>
<button id="no" onclick="shrinkNo()" onmouseover="runAway()">No 😜</button>

</div>

<div class="container" id="step2" style="display:none">

<h1>Hehe Pihu 😍</h1>
<p>How many babies do you want? 👶</p>

<button class="baby-btn" onclick="finalMsg(1)">1 👶</button>
<button class="baby-btn" onclick="finalMsg(2)">2 👶👶</button>
<button class="baby-btn" onclick="finalMsg(3)">3 👶👶👶</button>
<button class="baby-btn" onclick="finalMsg(4)">4 😅</button>

<p id="result"></p>

</div>

<script>

let size=1;

function shrinkNo(){
size -=0.1;
document.getElementById("no").style.transform="scale("+size+")";
}

function runAway(){

let btn=document.getElementById("no");

let x=Math.random()*window.innerWidth*0.8;
let y=Math.random()*window.innerHeight*0.8;

btn.style.position="absolute";
btn.style.left=x+"px";
btn.style.top=y+"px";

}

function nextStep(){
document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";
}

function finalMsg(num){

document.getElementById("result").innerHTML=
"Yay Pihu ❤️ Our cute family will have "+num+" baby/babies 👶💖";

}

/* floating hearts */

setInterval(function(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000)

},300);

</script>

</body>
</html>
